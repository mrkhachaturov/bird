log stderr all;
router id 10.1.1.1;        # bird's identifier — must differ from MikroTik's (10.1.1.100)

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export none;
    };
}

template static static_template {
    ipv4;
}

# One static protocol per source file. Each include is the fetcher's output.
protocol static static_RU from static_template {
    include "RU.txt";
}

protocol static static_RU_Max from static_template {
    include "RU_Max.txt";
}

protocol static static_Google from static_template {
    include "Google.txt";
}

protocol static static_Meta from static_template {
    include "Meta.txt";
}

protocol static static_Roblox from static_template {
    include "Roblox.txt";
}

# Community scheme.
#   200 = ANY RU source    ← umbrella; match this on Mikrotik for RU routing policy
#   201 = RU (ipverse / RIR)
#   202 = RU_Max (MaxMind)
#   203 = RU_Manual         (reserved for a hand-maintained RU_Manual.txt)
#   101 = Meta
#   102 = Google
#   116 = Roblox

function tag_ru(int source_code) {
    bgp_community.add((64500, 200));         # umbrella RU tag
    bgp_community.add((64500, source_code)); # source-specific
    accept;
}

function tag_service(int service_code) {
    bgp_community.add((64500, service_code));
    accept;
}

filter bgp_out {
    if proto = "static_RU"        then tag_ru(201);
    if proto = "static_RU_Max"    then tag_ru(202);
    if proto = "static_RU_Manual" then tag_ru(203);
    if proto = "static_Google"    then tag_service(102);
    if proto = "static_Meta"      then tag_service(101);
    if proto = "static_Roblox"    then tag_service(116);
    reject;
}

template bgp bgp_template {
    hold time 240;
    # router id (above) is a label; `local` is the real source IP bird binds.
    # On this WSL lab, eth0 = 172.28.151.183 — that's what `ip route get 10.1.110.1` resolves.
    # MikroTik will see the session arriving from 10.10.0.30 (WSL2 → Windows SNAT).
    local 172.28.151.183 as 64500;
    multihop 10;      # MikroTik is routed, not directly attached

    ipv4 {
        import none;
        export filter bgp_out;
        next hop self;
    };
}

protocol bgp MRK from bgp_template {
    description "MikroTik RouterOS (same-subnet test peer)";
    neighbor 10.10.0.1 as 64501;
}
