# ---------------------------------------------------------------------------
# Minimal example bird.conf — plain mode (no template rendering).
#
# Use this file directly (mount to /etc/bird/bird.conf) when your BGP
# session does NOT need an MD5 password, or when you're fine committing the
# password in clear text. For password-from-secret, see bird.conf.tmpl.
#
# Demonstrates a common pattern: MULTIPLE EXPORT FILTERS so different peers
# receive different subsets of your routes / community tags. See the two
# `filter …` blocks and the two `protocol bgp …` blocks at the bottom.
#
# IPs below are RFC 5737 documentation prefixes — replace with your own.
# ASNs are from the RFC 6996 private range.
# ---------------------------------------------------------------------------

log stderr all;
router id 192.0.2.1;

protocol device {}

protocol kernel {
    ipv4 {
        import none;
        export none;
    };
}

# Static protocols — one per list file generated by the fetcher.
template static static_template {
    ipv4;
}

protocol static static_RU     from static_template {
    include "RU.txt";
}
protocol static static_RU_Max from static_template {
    include "RU_Max.txt";
}
protocol static static_Google from static_template {
    include "Google.txt";
}
protocol static static_Meta   from static_template {
    include "Meta.txt";
}


# --- Community helpers -----------------------------------------------------

function tag_ru(int source_code) {
    bgp_community.add((64500, 200));            # umbrella RU
    bgp_community.add((64500, source_code));
    accept;
}

function tag_service(int service_code) {
    bgp_community.add((64500, service_code));
    accept;
}


# --- Export filters — one per "policy" -------------------------------------
#
# Each filter picks which prefixes leave on the peer it's attached to, and
# which communities they carry. Having several lets one upstream get a full
# feed while another sees only a slice.

# Full feed — RU + all service groups.
filter bgp_out_full {
    if proto = "static_RU"     then tag_ru(201);
    if proto = "static_RU_Max" then tag_ru(202);
    if proto = "static_Google" then tag_service(102);
    if proto = "static_Meta"   then tag_service(101);
    reject;
}

# Minimal feed — RU only, no service lists.
filter bgp_out_ru_only {
    if proto = "static_RU"     then tag_ru(201);
    if proto = "static_RU_Max" then tag_ru(202);
    reject;
}


# --- BGP peers -------------------------------------------------------------
#
# Two peers reusing the same template. The `ipv4 { export filter … }` block
# is the per-peer override — each peer picks its own filter.

template bgp bgp_template {
    hold time 240;
    local as 64500;          # no IP → kernel picks source based on route to neighbor

    # REQUIRED when bird runs inside a Docker bridge/overlay network:
    # the container's interfaces are 172.x.x.x, so peers on 10.x/192.168.x
    # aren't directly-connected neighbors from bird's point of view.
    # Without `multihop`, bird silently sits in BGP Idle ("Waiting for X to
    # become my neighbor" — trace-level only, invisible at info logging).
    # Safe to keep even with host networking or native installs.
    # See README → Troubleshooting → "BGP stays in Idle state forever".
    multihop 10;

    ipv4 {
        import none;
        next hop self;
    };
}

protocol bgp PEER_FULL from bgp_template {
    description "Upstream that gets everything (RU + services)";
    neighbor 198.51.100.1 as 64501;
    ipv4 { export filter bgp_out_full; };
    # password "shared-secret";
}

protocol bgp PEER_RU from bgp_template {
    description "Upstream that gets RU only (e.g. ISP that only handles RU policy)";
    neighbor 198.51.100.2 as 64502;
    ipv4 { export filter bgp_out_ru_only; };
}
