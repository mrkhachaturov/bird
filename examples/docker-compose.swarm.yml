# Example Swarm stack using bird.conf.tmpl + Docker secret for the BGP password.
#
# Unlike the plain compose example, here:
#   - bird.conf.tmpl lives in your git, committed as is (no secrets).
#   - BGP password lives in a Swarm secret (Raft-encrypted).
#   - The entrypoint renders the template with envsubst at container start;
#     the final bird.conf exists only inside the container, never on disk.
#
# One-time prep:
#   echo -n 'your-bgp-md5-secret' | docker secret create bgp_password -
#
# Deploy:
#   docker stack deploy -c docker-compose.swarm.yml bird
services:
  bird:
    image: ghcr.io/astrateam-net/bird-maxmind:0.1.1
    environment:
      # Enables template mode. BIRD_CONF defaults to /etc/bird/bird.conf — no
      # need to override it unless you want the rendered file in a non-default
      # location (e.g. a tmpfs so the rendered secret never touches disk).
      BIRD_CONF_TEMPLATE:       /etc/bird/bird.conf.tmpl
      BGP_PASSWORD_FILE:        /run/secrets/bgp_password
      MAXMIND_ACCOUNT_ID_FILE:  /run/secrets/maxmind_account_id
      MAXMIND_LICENSE_KEY_FILE: /run/secrets/maxmind_license_key
      WEBHOOK_SECRET_FILE:      /run/secrets/webhook_secret
    cap_add:
      - NET_ADMIN
      - NET_RAW
    configs:
      - source: bird_conf_tmpl
        target: /etc/bird/bird.conf.tmpl
      - source: bird_sources
        target: /etc/blacklist/sources.yaml
    secrets:
      - bgp_password
      - maxmind_account_id
      - maxmind_license_key
      - webhook_secret
    deploy:
      replicas: 1
      restart_policy:
        condition: any

configs:
  bird_conf_tmpl:
    file: ./bird/bird.conf.tmpl
  bird_sources:
    file: ./sources.yaml

secrets:
  bgp_password:
    external: true
  maxmind_account_id:
    external: true
  maxmind_license_key:
    external: true
  webhook_secret:
    external: true
